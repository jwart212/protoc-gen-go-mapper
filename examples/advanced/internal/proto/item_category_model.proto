syntax = "proto3";

package pos.item_categories.v1;

option go_package = "./internal/gen/item_categoriespb";

import "google/protobuf/timestamp.proto";

// ItemCategory represents the Item Category DB model
message ItemCategory {
  string id = 1;
  string tenant_id = 2;
  optional string parent_id = 3;
  string code = 4;
  string name = 5;
  optional string description = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
  optional google.protobuf.Timestamp deleted_at = 9;
  optional string deleted_by = 10;
}
