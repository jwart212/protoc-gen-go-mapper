syntax = "proto3";

package library;

option go_package = "gitlab.com/iktdev-boilerplate/go/protoc-gen-go-mapper/examples/medium/gen;gen";

message Author {
  int32 id = 1;
  string name = 2;
  string email = 3;
  optional string bio = 4;
}

message Book {
  int32 id = 1;
  string title = 2;
  string isbn = 3;
  optional string published_date = 4;
  optional int32 author_id = 5;
}

message Review {
  int32 id = 1;
  optional int32 book_id = 2;
  int32 user_id = 3;
  optional int32 rating = 4;
  optional string comment = 5;
}
